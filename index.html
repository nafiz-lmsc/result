<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BioChe — Exam Results Portal</title>
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#161616;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--muted:#888;--dim:#444;
  --neu-dark:rgba(0,0,0,0.9);--neu-light:rgba(255,255,255,0.06);
  --accent:#d4d4d4;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;}

/* Background Effects */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:60px 60px;animation:gridScroll 30s linear infinite;
}
@keyframes gridScroll{0%{transform:translateY(0);}100%{transform:translateY(60px);}}

#app{position:relative;z-index:1;min-height:100vh;}

/* Navbar */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:64px;
  background:rgba(10,10,10,0.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;color:#fff;}
.nav-logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#fff 0%,#888 100%);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#000;
}

/* Page Layout */
.page{display:none;padding:32px 24px;max-width:1100px;margin:0 auto;}
.page.active{display:block;}
.page-title{font-size:32px;font-weight:800;letter-spacing:-1px;}

/* Form Elements */
.form-group{margin-bottom:15px;}
.form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.neu-input{
  width:100%;padding:12px 16px;border-radius:10px;font-size:14px;color:var(--text);
  background:#0d0d0d;border:1px solid var(--border);
  box-shadow:inset 2px 2px 5px rgba(0,0,0,0.5);outline:none;transition:0.2s;
}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;
  transition:all 0.2s;border:1px solid transparent;
}
.btn-primary{background:linear-gradient(135deg,#fff 0%,#ccc 100%);color:#000;}
.btn-secondary{background:var(--glass);color:var(--text);border-color:var(--border2);}
.btn-danger{background:rgba(248,113,113,0.1);color:var(--red);border-color:rgba(248,113,113,0.2);}
.btn-sm{padding:5px 10px;font-size:11px;}

/* Grid & Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.card{
  background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);
  padding:24px;border-radius:16px;cursor:pointer;transition:0.3s;
}
.card:hover{border-color:var(--border2);transform:translateY(-4px);}

/* Table */
.results-table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);background:var(--glass);}
table{width:100%;border-collapse:collapse;}
th{padding:14px 16px;text-align:left;font-size:12px;color:var(--muted);text-transform:uppercase;background:rgba(255,255,255,0.02);}
td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:14px;}

/* Admin Layout */
.admin-layout{display:grid;grid-template-columns:220px 1fr;gap:30px;min-height:70vh;}
.admin-sidebar{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:15px; height: fit-content;}
.admin-nav-item{padding:12px 16px;border-radius:10px;cursor:pointer;color:var(--muted);margin-bottom:6px;transition:0.2s;font-size:14px;}
.admin-nav-item.active{background:var(--glass2);color:#fff;border:1px solid var(--border);}
.admin-list-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:12px;border:1px solid var(--border);background:var(--glass);margin-bottom:10px;}

/* Modals */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:#111;padding:30px;border-radius:20px;width:100%;max-width:440px;border:1px solid var(--border2);}

.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:12px;background:#fff;color:#000;font-weight:700;display:none;z-index:1000;}

/* Rank Badge */
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:800; background: #222;}
.rank-1{background:rgba(251,191,36,0.2);color:#fbbf24;}
</style>
</head>
<body>

<div id="app">
  <nav>
    <a class="nav-logo" onclick="goHome()">
      <div class="nav-logo-icon">BC</div>
      <div style="font-weight:700; margin-left:10px; font-size: 20px;">BioChe</div>
    </a>
    <div class="nav-right">
      <button class="btn btn-secondary btn-sm" id="backBtn" style="display:none;" onclick="handleBack()">Back</button>
      <button class="btn btn-secondary btn-sm" id="adminBtn" onclick="handleAdminBtnClick()">Admin</button>
    </div>
  </nav>

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div style="text-align:center; padding: 40px 0;">
      <h1 class="page-title">Results Dashboard</h1>
      <p style="color:var(--muted); margin-top:10px;">Select your class to track your performance.</p>
    </div>
    <div class="grid" id="classesGrid"></div>
  </div>

  <!-- CLASS PAGE -->
  <div class="page" id="page-class">
    <h1 class="page-title" id="classPageTitle">Class Results</h1>
    <div class="grid" id="examsGrid" style="margin-top:20px;"></div>
  </div>

  <!-- EXAM PAGE -->
  <div class="page" id="page-exam">
    <h1 class="page-title" id="examPageTitle">Exam Details</h1>
    <p id="examMeta" style="color:var(--muted); margin-bottom: 20px;"></p>
    <div id="resultsTableWrap"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="page" id="page-admin">
    <h1 class="page-title" style="margin-bottom: 30px;">Admin Control</h1>
    <div class="admin-layout">
      <div class="admin-sidebar">
        <div class="admin-nav-item active" id="nav-classes" onclick="setAdminTab('classes')">Classes</div>
        <div class="admin-nav-item" id="nav-exams" onclick="setAdminTab('exams')">Exams</div>
        <div class="admin-nav-item" id="nav-students" onclick="setAdminTab('students')">Add Results</div>
      </div>
      <div class="admin-content">
        <!-- Tab: Classes -->
        <div class="admin-tab" id="tab-classes">
          <div class="form-section">
            <h3 style="margin-bottom:15px;">New Class</h3>
            <input class="neu-input" id="inClassName" placeholder="e.g. Class 10" style="margin-bottom:10px;">
            <button class="btn btn-primary" onclick="adminAddClass()">Add Class</button>
          </div>
          <div id="adminClassList" style="margin-top:20px;"></div>
        </div>

        <!-- Tab: Exams -->
        <div class="admin-tab" id="tab-exams" style="display:none;">
          <div class="form-section">
            <h3 style="margin-bottom:15px;">Create Exam</h3>
            <div class="form-group">
                <label class="form-label">Target Class</label>
                <select class="neu-input" id="selExamClass"></select>
            </div>
            <div class="form-group">
                <label class="form-label">Exam Title</label>
                <input class="neu-input" id="inExamName" placeholder="e.g. Mid Term">
            </div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input class="neu-input" type="date" id="inExamDate">
                <input class="neu-input" type="number" id="inExamTotal" placeholder="Total Marks">
            </div>
            <button class="btn btn-primary" onclick="adminAddExam()">Create Exam</button>
          </div>
          <div id="adminExamList" style="margin-top:20px;"></div>
        </div>

        <!-- Tab: Results -->
        <div class="admin-tab" id="tab-students" style="display:none;">
          <div class="form-section">
            <h3 style="margin-bottom:15px;">Add Student Marks</h3>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <select class="neu-input" id="selStuClass" onchange="updateExamSelect()"></select>
                <select class="neu-input" id="selStuExam"></select>
            </div>
            <input class="neu-input" id="inStuName" placeholder="Student Name" style="margin-bottom:10px;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input class="neu-input" type="number" id="inStuMarks" placeholder="Marks">
                <input class="neu-input" id="inStuGuardian" placeholder="Phone (Optional)">
            </div>
            <button class="btn btn-primary" onclick="adminAddStudent()">Submit Marks</button>
          </div>
          <div id="adminStudentList" style="margin-top:20px;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Student Modal -->
<div class="modal-overlay" id="editStuModal">
    <div class="modal">
      <h3>Edit Result</h3>
      <input type="hidden" id="editStuClassId"><input type="hidden" id="editStuExamId"><input type="hidden" id="editStuId">
      <div class="form-group" style="margin-top:15px;">
          <label class="form-label">Name</label>
          <input class="neu-input" id="editStuName">
      </div>
      <div class="form-group">
          <label class="form-label">Marks</label>
          <input class="neu-input" type="number" id="editStuMarks">
      </div>
      <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="neu-input" id="editStuGuardian">
      </div>
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
        <button class="btn btn-secondary" onclick="closeModal('editStuModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveEditStudent()">Save Changes</button>
      </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h3>Admin Login</h3>
    <input class="neu-input" type="password" id="loginPass" placeholder="Password" style="margin-top:15px;">
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
      <button class="btn btn-secondary" onclick="closeModal('loginModal')">Cancel</button>
      <button class="btn btn-primary" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBxHLnJMMy3hcm0KZ8QMO5egbCBPpsybBg",
    authDomain: "bioche-5fe6a.firebaseapp.com",
    databaseURL: "https://bioche-5fe6a-default-rtdb.firebaseio.com",
    projectId: "bioche-5fe6a",
    storageBucket: "bioche-5fe6a.firebasestorage.app",
    messagingSenderId: "1091779493292",
    appId: "1:1091779493292:web:482f9ca61c72335c694e09"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'bioche_live_data');

let masterData = { classes: [] };
let isAdmin = false;
let activePage = 'home';
let curClassId = null;
let curExamId = null;

// Real-time Sync
onValue(dbRef, (snap) => {
    const val = snap.val();
    masterData = (val && val.classes) ? val : { classes: [] };
    render();
});

function sync() { set(dbRef, masterData); }

// Navigation
window.goHome = () => { activePage = 'home'; render(); };
window.handleBack = () => {
    activePage = (activePage === 'exam') ? 'class' : 'home';
    render();
};
window.navToClass = (id) => { curClassId = id; activePage = 'class'; render(); };
window.navToExam = (cid, eid) => { curClassId = cid; curExamId = eid; activePage = 'exam'; render(); };

function render() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + activePage).classList.add('active');
    document.getElementById('backBtn').style.display = (['home', 'admin'].includes(activePage)) ? 'none' : 'inline-flex';

    if(activePage === 'home') renderHome();
    if(activePage === 'class') renderClass();
    if(activePage === 'exam') renderExam();
    if(activePage === 'admin') renderAdmin();
}

function renderHome() {
    let html = '';
    masterData.classes.forEach(c => {
        html += `<div class="card" onclick="navToClass('${c.id}')">
            <h3>${c.name}</h3>
            <p style="color:var(--muted); font-size:13px; margin-top:8px;">${(c.exams||[]).length} Exams published</p>
        </div>`;
    });
    document.getElementById('classesGrid').innerHTML = html || '<p>No data found.</p>';
}

function renderClass() {
    const cls = masterData.classes.find(c => c.id === curClassId);
    if(!cls) return goHome();
    document.getElementById('classPageTitle').innerText = cls.name;
    let html = '';
    (cls.exams || []).forEach(e => {
        html += `<div class="card" onclick="navToExam('${cls.id}', '${e.id}')">
            <h3 style="font-size:18px;">${e.title}</h3>
            <p style="font-size:12px; color:var(--muted);">${e.date}</p>
            <div style="margin-top:15px; font-weight:800; font-size:14px;">High Score: ${e.highestScore || 0} / ${e.totalScore}</div>
        </div>`;
    });
    document.getElementById('examsGrid').innerHTML = html || '<p>No exams found.</p>';
}

function renderExam() {
    const cls = masterData.classes.find(c => c.id === curClassId);
    const exam = (cls?.exams || []).find(e => e.id === curExamId);
    if(!exam) return goHome();

    document.getElementById('examPageTitle').innerText = exam.title;
    document.getElementById('examMeta').innerText = `Level: ${cls.name} • Full Score: ${exam.totalScore}`;
    
    let rows = '';
    const sorted = (exam.students || []).sort((a,b) => b.marks - a.marks);
    sorted.forEach((s, i) => {
        rows += `<tr>
            <td><div class="rank-badge ${i<3?'rank-1':''}">${i+1}</div></td>
            <td style="font-weight:600;">${s.name}</td>
            <td style="font-weight:700;">${s.marks}</td>
            <td>${isAdmin ? `
                <button class="btn btn-secondary btn-sm" onclick="window.openEditStu('${cls.id}','${exam.id}','${s.id}')">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="window.adminDeleteStu('${cls.id}','${exam.id}','${s.id}')">Del</button>
            ` : 'Result Published'}</td>
        </tr>`;
    });
    document.getElementById('resultsTableWrap').innerHTML = `
        <div class="results-table-wrap">
            <table><thead><tr><th>Rank</th><th>Name</th><th>Score</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>
        </div>`;
}

// ADMIN PANEL LOGIC
window.setAdminTab = (id) => {
    document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.admin-nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('tab-' + id).style.display = 'block';
    document.getElementById('nav-' + id).classList.add('active');
};

function renderAdmin() {
    const classOpts = masterData.classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    document.getElementById('selExamClass').innerHTML = classOpts;
    document.getElementById('selStuClass').innerHTML = classOpts;
    
    updateExamSelect();

    // Admin Classes List
    document.getElementById('adminClassList').innerHTML = masterData.classes.map(c => `
        <div class="admin-list-item">
            <span>${c.name}</span>
            <div style="display:flex; gap:5px;">
                <button class="btn btn-secondary btn-sm" onclick="window.editClassName('${c.id}')">Rename</button>
                <button class="btn btn-danger btn-sm" onclick="window.adminDeleteClass('${c.id}')">Delete</button>
            </div>
        </div>`).join('');

    // Admin Exams List
    let exHtml = '';
    masterData.classes.forEach(c => {
        (c.exams||[]).forEach(e => {
            exHtml += `<div class="admin-list-item">
                <div><b>${e.title}</b> <small>(${c.name})</small></div>
                <button class="btn btn-danger btn-sm" onclick="window.adminDeleteExam('${c.id}','${e.id}')">Delete</button>
            </div>`;
        });
    });
    document.getElementById('adminExamList').innerHTML = exHtml;

    // Admin Students List
    let stuHtml = '';
    masterData.classes.forEach(c => {
        (c.exams||[]).forEach(e => {
            (e.students||[]).forEach(s => {
                stuHtml += `<div class="admin-list-item">
                    <div>${s.name} (${s.marks}) <small>${e.title}</small></div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-secondary btn-sm" onclick="window.openEditStu('${c.id}','${e.id}','${s.id}')">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="window.adminDeleteStu('${c.id}','${e.id}','${s.id}')">Remove</button>
                    </div>
                </div>`;
            });
        });
    });
    document.getElementById('adminStudentList').innerHTML = stuHtml;
}

// ADMIN ACTIONS
window.adminAddClass = () => {
    const name = document.getElementById('inClassName').value.trim();
    if(!name) return showToast('Enter name', 'error');
    masterData.classes.push({ id: 'c'+Date.now(), name, exams: [] });
    sync(); document.getElementById('inClassName').value = '';
    showToast('Class Added', 'success');
};

window.editClassName = (id) => {
    const cls = masterData.classes.find(c => c.id === id);
    const n = prompt('Rename class to:', cls.name);
    if(n) { cls.name = n; sync(); }
};

window.adminDeleteClass = (id) => {
    if(!confirm('Delete this class and all data?')) return;
    masterData.classes = masterData.classes.filter(c => c.id !== id);
    sync();
};

window.adminAddExam = () => {
    const cid = document.getElementById('selExamClass').value;
    const t = document.getElementById('inExamName').value.trim();
    const d = document.getElementById('inExamDate').value;
    const total = parseInt(document.getElementById('inExamTotal').value);
    const cls = masterData.classes.find(c => c.id === cid);
    if(!t || !d || isNaN(total)) return showToast('Fill all fields', 'error');
    if(!cls.exams) cls.exams = [];
    cls.exams.push({ id: 'e'+Date.now(), title: t, date: d, totalScore: total, students: [], highestScore: 0 });
    sync();
    showToast('Exam Created', 'success');
};

window.adminDeleteExam = (cid, eid) => {
    if(!confirm('Delete exam?')) return;
    const cls = masterData.classes.find(c => c.id === cid);
    cls.exams = cls.exams.filter(e => e.id !== eid);
    sync();
};

window.updateExamSelect = () => {
    const cid = document.getElementById('selStuClass').value;
    const cls = masterData.classes.find(c => c.id === cid);
    const sel = document.getElementById('selStuExam');
    if(cls && cls.exams) {
        sel.innerHTML = cls.exams.map(e => `<option value="${e.id}">${e.title}</option>`).join('');
    } else {
        sel.innerHTML = '<option disabled>No exams</option>';
    }
};

window.adminAddStudent = () => {
    const cid = document.getElementById('selStuClass').value;
    const eid = document.getElementById('selStuExam').value;
    const name = document.getElementById('inStuName').value.trim();
    const marks = parseInt(document.getElementById('inStuMarks').value);
    const g = document.getElementById('inStuGuardian').value;

    if(!eid) return showToast('Create an exam first', 'error');
    if(!name || isNaN(marks)) return showToast('Invalid data', 'error');

    const cls = masterData.classes.find(c => c.id === cid);
    const exm = cls.exams.find(e => e.id === eid);
    if(!exm.students) exm.students = [];
    exm.students.push({ id: 's'+Date.now(), name, marks, guardianMobile: g });
    exm.highestScore = Math.max(...exm.students.map(s => s.marks));
    sync();
    document.getElementById('inStuName').value = '';
    document.getElementById('inStuMarks').value = '';
    showToast('Result Saved', 'success');
};

window.openEditStu = (cid, eid, sid) => {
    const cls = masterData.classes.find(c => c.id === cid);
    const exm = cls.exams.find(e => e.id === eid);
    const stu = exm.students.find(s => s.id === sid);
    document.getElementById('editStuClassId').value = cid;
    document.getElementById('editStuExamId').value = eid;
    document.getElementById('editStuId').value = sid;
    document.getElementById('editStuName').value = stu.name;
    document.getElementById('editStuMarks').value = stu.marks;
    document.getElementById('editStuGuardian').value = stu.guardianMobile || '';
    window.openModal('editStuModal');
};

window.saveEditStudent = () => {
    const cid = document.getElementById('editStuClassId').value;
    const eid = document.getElementById('editStuExamId').value;
    const sid = document.getElementById('editStuId').value;
    const cls = masterData.classes.find(c => c.id === cid);
    const exm = cls.exams.find(e => e.id === eid);
    const stu = exm.students.find(s => s.id === sid);
    stu.name = document.getElementById('editStuName').value.trim();
    stu.marks = parseInt(document.getElementById('editStuMarks').value);
    stu.guardianMobile = document.getElementById('editStuGuardian').value;
    exm.highestScore = Math.max(...exm.students.map(s => s.marks));
    sync();
    window.closeModal('editStuModal');
    showToast('Result Updated', 'success');
};

window.adminDeleteStu = (cid, eid, sid) => {
    if(!confirm('Delete result?')) return;
    const cls = masterData.classes.find(c => c.id === cid);
    const exm = cls.exams.find(e => e.id === eid);
    exm.students = exm.students.filter(s => s.id !== sid);
    exm.highestScore = exm.students.length ? Math.max(...exm.students.map(s => s.marks)) : 0;
    sync();
};

// LOGIN
window.handleAdminBtnClick = () => {
    if(isAdmin) { isAdmin = false; goHome(); document.getElementById('adminBtn').innerText = 'Admin'; }
    else window.openModal('loginModal');
};
window.doLogin = () => {
    if(document.getElementById('loginPass').value === 'admin@biochepass') {
        isAdmin = true; activePage = 'admin'; window.closeModal('loginModal');
        document.getElementById('adminBtn').innerText = 'Logout'; render();
    } else { showToast('Invalid Pass', 'error'); }
};

// UTILS
window.openModal = (id) => document.getElementById(id).classList.add('show');
window.closeModal = (id) => document.getElementById(id).classList.remove('show');
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    t.style.background = (type === 'success') ? '#4ade80' : '#f87171';
    setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
